name: FastAPI CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout repo
    - name: Checkout code
      uses: actions/checkout@v4

    # 2️⃣ Setup Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # 3️⃣ Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        
    # 4️⃣ Run FastAPI in background
    - name: Start FastAPI server
      run: |
        uvicorn main:app --host 127.0.0.1 --port 8000 &
        sleep 5

    # 5️⃣ Test API endpoint
    - name: Test API
      run: |
        curl -f http://127.0.0.1:8000/ || exit 1

    # 6️⃣ (Optional) Run pytest if you add tests
    - name: Run tests
      run: |
        pytest || echo "No tests yet"


    # 3.1️⃣ Install Uvicorn
    - name: Install Uvicorn
      run: |
        pip install uvicorn

    # 3.1️⃣ Install Uvicorn
    - name: Install Uvicorn
      run: |
        pip install uvicorn
        pip install -r requirements.txt


    # 3.1️⃣ Install requirements including Uvicorn
    - name: Install Uvicorn
      run: pip install -r requirements.txt
        pip install -r requirements.txt
